name: Template Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-standards:
    name: Check project standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate template standards
        run: node scripts/check-project-standards.mjs
