name: Sync Standards to Product Repository

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Dépôt cible (owner/repo), ex. openg7/openg7-nexus.'
        required: true
        type: string
      target_branch:
        description: 'Branche de base dans le dépôt cible pour la PR.'
        required: true
        default: main
        type: string
      draft_pr:
        description: 'Ouvrir la PR en brouillon.'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: sync-standards-${{ github.event.inputs.target_repo }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync governance contract to ${{ github.event.inputs.target_repo }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out template repository
        uses: actions/checkout@v4

      - name: Check sync token configuration
        id: config
        shell: bash
        run: |
          if [ -z "${{ secrets.STANDARDS_SYNC_TOKEN }}" ]; then
            {
              echo "## Sync Standards to Product Repository"
              echo
              echo "This workflow is intentionally a guarded placeholder until it is configured."
              echo
              echo "It requires a repository secret **STANDARDS_SYNC_TOKEN**: a token with"
              echo "\`contents:write\` and \`pull-requests:write\` on \`${{ github.event.inputs.target_repo }}\`."
              echo "Add it under Settings > Secrets and variables > Actions before re-running this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "STANDARDS_SYNC_TOKEN is not configured; aborting." >&2
            exit 1
          fi

      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repo }}
          ref: ${{ github.event.inputs.target_branch }}
          token: ${{ secrets.STANDARDS_SYNC_TOKEN }}
          path: target-repo

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for drift
        id: drift
        shell: bash
        run: |
          if node scripts/sync-openg7-standards.mjs --target target-repo --check; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply governance contract
        if: steps.drift.outputs.drifted == 'true'
        run: node scripts/sync-openg7-standards.mjs --target target-repo

      - name: Create pull request in target repository
        if: steps.drift.outputs.drifted == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          path: target-repo
          token: ${{ secrets.STANDARDS_SYNC_TOKEN }}
          base: ${{ github.event.inputs.target_branch }}
          branch: sync/openg7-template-${{ github.run_id }}
          commit-message: 'chore: sync governance standards from openg7-project-template'
          title: 'Sync governance standards from openg7-project-template'
          draft: ${{ github.event.inputs.draft_pr }}
          delete-branch: true
          body: |
            ## Governance sync

            - Source: `${{ github.repository }}@${{ github.sha }}`
            - Triggered by: @${{ github.actor }}
            - Files synced: see `scripts/sync-manifest.json` in the template repository.

            Review the diff carefully — this PR was generated by `scripts/sync-openg7-standards.mjs`
            and may overwrite local customizations to synced files.

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Sync Standards to Product Repository"
            echo
            echo "- Target: ${{ github.event.inputs.target_repo }}@${{ github.event.inputs.target_branch }}"
            if [ "${{ steps.drift.outputs.drifted }}" = "false" ]; then
              echo "- Result: no drift detected, nothing to sync."
            elif [ -n "${{ steps.create_pr.outputs.pull-request-url }}" ]; then
              echo "- Pull request: ${{ steps.create_pr.outputs.pull-request-url }}"
            else
              echo "- Result: drift detected but no pull request was created (see logs)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
