name: Codex Branch and PR

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Instruction courte pour Codex (ex: corriger un bug, ajouter un test, mettre a jour une doc).'
        required: true
        type: string
      scope:
        description: 'Zone autorisee pour la premiere iteration.'
        required: true
        default: openg7-org
        type: choice
        options:
          - openg7-org
          - strapi
          - packages-contracts
          - packages-tooling
          - repository-root
      base_branch:
        description: 'Branche de base pour la PR.'
        required: true
        default: main
        type: string
      draft_pr:
        description: 'Ouvrir la PR en brouillon.'
        required: true
        default: true
        type: boolean
      model:
        description: 'Modele Codex optionnel. Laisser vide pour le defaut du runner.'
        required: false
        default: ''
        type: string
      effort:
        description: 'Niveau de raisonnement optionnel. Laisser vide pour le defaut.'
        required: false
        default: ''
        type: string
      correlation_id:
        description: 'Identifiant de correlation OpenG7 pour suivre ce run depuis le front.'
        required: false
        default: ''
        type: string
      idempotency_key:
        description: 'Cle idempotente optionnelle fournie par le front ou Ops.'
        required: false
        default: ''
        type: string

run-name: Codex ${{ inputs.correlation_id || github.run_id }} / ${{ inputs.scope }}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-pr-${{ github.ref }}-${{ github.event.inputs.scope }}
  cancel-in-progress: false

jobs:
  codex-pr:
    name: Run Codex and open PR
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.base_branch }}
          fetch-depth: 0

      - name: Install Codex sandbox prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Resolve allowed working directory
        id: scope
        shell: bash
        run: |
          case "${{ github.event.inputs.scope }}" in
            openg7-org)
              workdir="openg7-org"
              ;;
            strapi)
              workdir="strapi"
              ;;
            packages-contracts)
              workdir="packages/contracts"
              ;;
            packages-tooling)
              workdir="packages/tooling"
              ;;
            repository-root)
              workdir="."
              ;;
            *)
              echo "Unsupported scope: ${{ github.event.inputs.scope }}" >&2
              exit 1
              ;;
          esac

          branch="codex/${{ github.event.inputs.scope }}-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "workdir=$workdir" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install workspace dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Run Codex in selected scope
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          working-directory: ${{ steps.scope.outputs.workdir }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-home: ${{ runner.temp }}/codex-home
          model: ${{ github.event.inputs.model }}
          effort: ${{ github.event.inputs.effort }}
          prompt: |
            You are preparing a focused repository change for OpenG7.

            Requested task:
            ${{ github.event.inputs.task }}

            Required constraints:
            - Follow the repository instructions in AGENTS.md.
            - Prefer the smallest correct change that satisfies the task.
            - Keep changes inside or adjacent to the selected scope when possible: ${{ steps.scope.outputs.workdir }}.
            - Do not modify secrets, workflow tokens, deployment credentials, or unrelated files.
            - Run the narrowest validation that proves the edited slice works.
            - If the request is ambiguous, unsafe, or cannot be completed confidently, do not guess. Explain the blocker in the final message.

            Git context:
            - Base branch: ${{ github.event.inputs.base_branch }}
            - Branch to publish: ${{ steps.scope.outputs.branch }}
            - Triggered by: @${{ github.actor }}
            - Correlation id: ${{ github.event.inputs.correlation_id }}

            Final message format:
            Summary: short paragraph
            Validation: commands run and results
            Risks: only if material risks remain

      - name: Prepare pull request metadata
        id: pr_metadata
        shell: bash
        env:
          TASK: ${{ github.event.inputs.task }}
        run: |
          normalized="$(
            printf '%s' "$TASK" \
              | tr '\r\n\t' '   ' \
              | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//'
          )"
          if [ -z "$normalized" ]; then
            normalized="Codex update"
          fi

          max_subject=220
          subject="$normalized"
          if [ "${#subject}" -gt "$max_subject" ]; then
            subject="${subject:0:$((max_subject - 3))}..."
          fi

          echo "title=Codex: $subject" >> "$GITHUB_OUTPUT"
          echo "commit_message=chore(codex): $subject" >> "$GITHUB_OUTPUT"

      - name: Create pull request from Codex changes
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          base: ${{ github.event.inputs.base_branch }}
          branch: ${{ steps.scope.outputs.branch }}
          commit-message: ${{ steps.pr_metadata.outputs.commit_message }}
          title: ${{ steps.pr_metadata.outputs.title }}
          draft: ${{ github.event.inputs.draft_pr }}
          delete-branch: true
          body: |
            ## Codex v1 run

            - Triggered by: @${{ github.actor }}
            - Scope: `${{ github.event.inputs.scope }}`
            - Working directory: `${{ steps.scope.outputs.workdir }}`
            - Base branch: `${{ github.event.inputs.base_branch }}`
            - Workflow run: `${{ github.run_id }}`
            - Correlation id: `${{ github.event.inputs.correlation_id }}`
            - Idempotency key: `${{ github.event.inputs.idempotency_key }}`

            ## Codex summary

            ${{ steps.run_codex.outputs.final-message }}

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Codex Branch and PR"
            echo
            echo "- Scope: ${{ github.event.inputs.scope }}"
            echo "- Working directory: ${{ steps.scope.outputs.workdir }}"
            echo "- Base branch: ${{ github.event.inputs.base_branch }}"
            echo "- Correlation id: ${{ github.event.inputs.correlation_id }}"
            if [ -n "${{ steps.create_pr.outputs.pull-request-url }}" ]; then
              echo "- Pull request: ${{ steps.create_pr.outputs.pull-request-url }}"
            else
              echo "- Pull request: no code change detected or PR not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
